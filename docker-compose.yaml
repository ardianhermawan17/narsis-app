services:
  # narsis-app-frontend-react:
  #   build:
  #     context: ./frontend
  #     dockerfile: Dockerfile
  #   container_name: narsis-app-frontend-react
  #   ports:
  #     - "3000:3000"
  #   environment:
  #     - NODE_ENV=development
  #   volumes:
  #     - ./frontend:/app
  #   depends_on:
  #     - narsis-app-backend-php

  narsis-app-backend-php:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: narsis-app-backend-php
    ports:
      - "8080:80"
    environment:
      - APP_ENV=development
      - DATABASE_URL=postgres://narsis:narsis@/narsisdb?host=/var/run/postgresql
    volumes:
      - ./backend:/var/www/html
    depends_on:
      - narsis-app-postgress

  narsis-app-postgress:
    image: postgres:14
    container_name: narsis-app-postgress
    environment:
      POSTGRES_USER: narsis
      POSTGRES_PASSWORD: narsis
      POSTGRES_DB: narsisdb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
